    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Resuvio-AI",
        "applicationCategory": "BusinessApplication",
        "description": "AI-powered resume builder and career tools platform",
        "offers": {
          "@type": "Offer",

          "priceCurrency": "INR"

          "ratingCount": "1200"
        }
      }

  <body class="bg-background text-foreground">
    <div id="root"></div>
    <!-- Anti-flash theme bootstrap: set 'dark' class on <html> before paint -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('aicf-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (prefersDark ? 'dark' : 'light');
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <!-- Razorpay Checkout JS (loaded for payment integration) -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
